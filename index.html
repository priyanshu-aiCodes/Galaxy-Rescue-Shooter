        coreGrad.addColorStop(0,   '#ffffff');
        coreGrad.addColorStop(0.3, '#ffcc44');
        coreGrad.addColorStop(0.7, '#ff4400');
        coreGrad.addColorStop(1,   'rgba(200,0,0,0)');
        ctx.beginPath();
        ctx.arc(bb.x, bb.y, 7, 0, Math.PI * 2);
        ctx.fillStyle   = coreGrad;
        ctx.shadowColor = '#ff4400';
        ctx.shadowBlur  = 16;
        ctx.fill();

        ctx.restore();
      }
    }

    /**
     * updateDeathFlash — tick the screen-flash timer each frame.
     * @param {number} dt  delta time in seconds
     */
    function updateDeathFlash(dt) {
      if (deathFlash.active) {
        deathFlash.life -= dt;
        if (deathFlash.life <= 0) {
          deathFlash.active = false;
          deathFlash.life   = 0;
        }
      }
    }

    /**
     * renderDeathFlash — full-screen white flash overlay that fades out.
     * Called last in render so it sits on top of everything.
     */
    function renderDeathFlash() {
      if (!deathFlash.active) return;
      var ft = deathFlash.life / deathFlash.duration;
      ctx.save();
      ctx.globalAlpha = ft * 0.85;
      ctx.fillStyle   = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    // ═══════════════════════════════════════════════════════════════
    //  POWER-UP SYSTEM
    // ═══════════════════════════════════════════════════════════════

    /** Return a random spawn interval between PU_SPAWN_MIN and PU_SPAWN_MAX. */
    function nextPuInterval() {
      return PU_SPAWN_MIN + Math.random() * (PU_SPAWN_MAX - PU_SPAWN_MIN);
    }

    /**
     * spawnPowerUp — drop a random capsule from a random x near the top.
     */
    function spawnPowerUp() {
      var types  = [PU.RAPID, PU.TRIPLE, PU.SHIELD];
      var type   = types[Math.floor(Math.random() * types.length)];
      var margin = 60;
      powerUps.push({
        x:         margin + Math.random() * (canvas.width - margin * 2),
        y:         -30,
        type:      type,
        speed:     48,          // slow drift downward
        r:         18,          // capsule radius for draw + collision
        spinPhase: Math.random() * Math.PI * 2,   // drives rotation animation
        glowPhase: Math.random() * Math.PI * 2
      });
    }

    /**
     * spawnPuText — create a floating notification string above the ship.
     */
    function spawnPuText(x, y, text, colour) {
      puTexts.push({
        x: x, y: y, vy: -55,
        text:    text,
        colour:  colour,
        life:    1.6,
        maxLife: 1.6
      });
    }

    /**
     * collectPowerUp — apply a collected power-up to the player.
     */
    function collectPowerUp(type) {
      var cfg = PU_CFG[type];
      playPickupSound();
      spawnPuText(ship.x, ship.y - 70, cfg.label, cfg.colour);

      if (type === PU.SHIELD) {
        shieldActive  = true;
        activePowerUp = PU.SHIELD;
        powerUpTimer  = 0;   // shield has no timer — lasts until hit
      } else {
        activePowerUp = type;
        powerUpTimer  = PU_DURATION;
        shieldActive  = false;
      }
    }

    /**
     * updatePowerUps — tick spawn timer, move capsules, check collection,
     * tick the active power-up countdown, advance floating texts.
     * @param {number} dt  delta time in seconds
     */
    function updatePowerUps(dt) {
      // ── Spawn timer ───────────────────────────────────────────
      puSpawnTimer -= dt;
      if (puSpawnTimer <= 0) {
        spawnPowerUp();
        puSpawnTimer = nextPuInterval();
      }

      // ── Move capsules + collection check ─────────────────────
      for (var i = powerUps.length - 1; i >= 0; i--) {
        var pu = powerUps[i];
        pu.y         += pu.speed * dt;
        pu.spinPhase += dt * 2.2;
        pu.glowPhase += dt * 3.0;

        // Off-screen cull
        if (pu.y > canvas.height + 40) { powerUps.splice(i, 1); continue; }

        // Collection — circle vs circle with ship centre
        var dx = pu.x - ship.x;
        var dy = pu.y - ship.y;
        if (Math.sqrt(dx * dx + dy * dy) < pu.r + 36) {
          collectPowerUp(pu.type);
          powerUps.splice(i, 1);
        }
      }

      // ── Active power-up countdown (timed types only) ──────────
      if (activePowerUp && activePowerUp !== PU.SHIELD) {
        powerUpTimer -= dt;
        if (powerUpTimer <= 0) {
          activePowerUp = null;
          powerUpTimer  = 0;
        }
      }

      // ── Floating texts ────────────────────────────────────────
      for (var j = puTexts.length - 1; j >= 0; j--) {
        var pt = puTexts[j];
        pt.y    += pt.vy * dt;
        pt.life -= dt;
        if (pt.life <= 0) { puTexts.splice(j, 1); }
      }
    }

    /**
     * renderPowerUps — draw each capsule as a glowing spinning gem,
     * then draw the floating pickup texts.
     */
    function renderPowerUps() {
      // ── Capsules ─────────────────────────────────────────────
      for (var i = 0; i < powerUps.length; i++) {
        var pu    = powerUps[i];
        var cfg   = PU_CFG[pu.type];
        var pulse = 0.65 + 0.35 * Math.sin(pu.glowPhase);
        var r     = pu.r;

        ctx.save();
        ctx.translate(pu.x, pu.y);
        ctx.rotate(pu.spinPhase * 0.4);

        // Outer glow
        var glow = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 2.2);
        glow.addColorStop(0,   cfg.colour.replace(')', ', 0.35)').replace('rgb', 'rgba') || 'rgba(255,255,255,0.25)');
        glow.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(0, 0, r * 2.2, 0, Math.PI * 2);
        ctx.fillStyle = glow;
        ctx.fill();

        // Hexagon body
        ctx.beginPath();
        for (var k = 0; k < 6; k++) {
          var ang = (k / 6) * Math.PI * 2 - Math.PI / 6;
          var px  = Math.cos(ang) * r;
          var py  = Math.sin(ang) * r;
          if (k === 0) { ctx.moveTo(px, py); } else { ctx.lineTo(px, py); }
        }
        ctx.closePath();
        var bodyGrad = ctx.createRadialGradient(-r * 0.3, -r * 0.3, 0, 0, 0, r);
        bodyGrad.addColorStop(0,   '#ffffff');
        bodyGrad.addColorStop(0.3, cfg.colour);
        bodyGrad.addColorStop(1,   cfg.glow);
        ctx.fillStyle   = bodyGrad;
        ctx.shadowColor = cfg.glow;
        ctx.shadowBlur  = 18 * pulse;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.60)';
        ctx.lineWidth   = 1.5;
        ctx.stroke();

        // Icon letter in centre
        ctx.shadowBlur   = 0;
        ctx.font         = 'bold ' + Math.round(r * 1.1) + 'px "Segoe UI", monospace';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = '#ffffff';
        var icon = pu.type === PU.RAPID ? 'R' : pu.type === PU.TRIPLE ? 'T' : 'S';
        ctx.fillText(icon, 0, 1);

        ctx.restore();
      }

      // ── Floating pickup texts ─────────────────────────────────
      for (var j = 0; j < puTexts.length; j++) {
        var pt    = puTexts[j];
        var alpha = pt.life / pt.maxLife;
        var fsize = clamp(Math.floor(canvas.width / 38), 14, 22);
        ctx.save();
        ctx.globalAlpha  = alpha;
        ctx.font         = 'bold ' + fsize + 'px "Segoe UI", monospace';
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle    = pt.colour;
        ctx.shadowColor  = pt.colour;
        ctx.shadowBlur   = 14 * alpha;
        ctx.fillText(pt.text, pt.x, pt.y);
        ctx.restore();
      }
    }

    /**
     * renderPowerUpHUD — shows the active power-up name + countdown bar
     * in the top-right corner, just below the lives row.
     */
    function renderPowerUpHUD() {
      if (!activePowerUp) return;

      var cfg  = PU_CFG[activePowerUp];
      var pad  = 18;
      var barW = 140;
      var barH = 10;
      var bx   = canvas.width - pad - barW;
      var by   = 52;                          // sits below the lives row
      var size = clamp(Math.floor(canvas.width / 52), 11, 16);

      ctx.save();

      // Label
      ctx.font         = 'bold ' + size + 'px "Segoe UI", monospace';
      ctx.textAlign    = 'right';
      ctx.textBaseline = 'top';
      ctx.fillStyle    = cfg.colour;
      ctx.shadowColor  = cfg.glow;
      ctx.shadowBlur   = 10;
      var label = (activePowerUp === PU.SHIELD)
                    ? '⬡  SHIELD'
                    : '⬡  ' + (activePowerUp === PU.RAPID ? 'RAPID FIRE' : 'TRIPLE SHOT');
      ctx.fillText(label, canvas.width - pad, by);

      // Timer bar (not drawn for shield — it has no duration)
      if (activePowerUp !== PU.SHIELD) {
        var frac = Math.max(powerUpTimer / PU_DURATION, 0);
        var pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.008);

        // Track
        ctx.fillStyle   = 'rgba(255,255,255,0.12)';
        ctx.shadowBlur  = 0;
        drawRoundRect(bx, by + size + 5, barW, barH, 4);
        ctx.fill();

        // Fill
        if (frac > 0) {
          var fillGrad = ctx.createLinearGradient(bx, 0, bx + barW * frac, 0);
          fillGrad.addColorStop(0,   cfg.glow);
          fillGrad.addColorStop(1,   cfg.colour);
          ctx.fillStyle   = fillGrad;
          ctx.shadowColor = cfg.glow;
          ctx.shadowBlur  = 8 * pulse;
          drawRoundRect(bx, by + size + 5, barW * frac, barH, 4);
          ctx.fill();
        }

        // Seconds remaining text
        ctx.font         = (size - 2) + 'px "Segoe UI", monospace';
        ctx.textAlign    = 'right';
        ctx.textBaseline = 'top';
        ctx.fillStyle    = 'rgba(255,255,255,0.75)';
        ctx.shadowBlur   = 0;
        ctx.fillText(powerUpTimer.toFixed(1) + 's',
                     canvas.width - pad, by + size + barH + 8);
      }

      ctx.restore();
    }

    /**
     * renderShieldAura — draws a translucent hexagonal shield ring around
     * the player ship when shieldActive is true.
     */
    function renderShieldAura() {
      if (!shieldActive) return;
      var pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.006);
      ctx.save();
      ctx.translate(ship.x, ship.y);

      // Outer ring
      ctx.beginPath();
      ctx.arc(0, 0, 58, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(136,255,68,' + (0.55 * pulse + 0.2) + ')';
      ctx.lineWidth   = 2.5;
      ctx.shadowColor = '#88ff44';
      ctx.shadowBlur  = 20 * pulse;
      ctx.stroke();

      // Inner glow fill
      var sg = ctx.createRadialGradient(0, 0, 20, 0, 0, 58);
      sg.addColorStop(0,   'rgba(136,255,68,0.00)');
      sg.addColorStop(0.7, 'rgba(136,255,68,' + (0.08 * pulse) + ')');
      sg.addColorStop(1,   'rgba(136,255,68,' + (0.18 * pulse) + ')');
      ctx.beginPath();
      ctx.arc(0, 0, 58, 0, Math.PI * 2);
      ctx.fillStyle = sg;
      ctx.fill();

      ctx.restore();
    }

    // ═══════════════════════════════════════════════════════════════
    //  UTILITY HELPERS
    // ═══════════════════════════════════════════════════════════════

    /**
     * drawRoundRect — builds a rounded-rectangle path on ctx.
     * Caller must call ctx.fill() and/or ctx.stroke() afterwards.
     */
    function drawRoundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y,     x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h,     x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y,         x + r, y);
      ctx.closePath();
    }

    /** clamp — constrain val to [min, max]. */
    function clamp(val, min, max) {
      return Math.min(max, Math.max(min, val));
    }

    // ═══════════════════════════════════════════════════════════════
    //  CORE LOOP  —  resize / input / update / render / init
    // ═══════════════════════════════════════════════════════════════

    /**
     * resize — match canvas pixel dimensions to the browser viewport.
     * Stars are re-scattered and the ship is re-centred to fit the new size.
     */
    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      initStars();
      // Re-anchor ship vertically; keep its current horizontal position if playing
      if (gameState === STATE.PLAYING) {
        ship.y = canvas.height - 90;
        ship.x = clamp(ship.x, ship.w, canvas.width - ship.w);
      }
    }

    /**
     * input — read the key map once per frame and act on it.
     * Start-screen: ENTER → transition to PLAYING state.
     */
    function input() {
      // ── Start screen → Playing ────────────────────────────────
      if (gameState === STATE.START && keys['Enter']) {
        keys['Enter']      = false;
        score              = 0;
        lives              = MAX_LIVES;
        level              = 1;
        levelUpTimer       = 0;
        shakeTimer         = 0;
        bullets            = [];
        enemies            = [];
        particles          = [];
        boss               = null;
        bossBullets        = [];
        bossSpawnTimer     = BOSS_SPAWN_TIME;
        bossScoreTriggered = false;
        deathFlash.active  = false;
        deathFlash.life    = 0;
        powerUps           = [];
        puTexts            = [];
        puSpawnTimer       = 8;
        activePowerUp      = null;
        powerUpTimer       = 0;
        shieldActive       = false;
        shootCooldown      = 0;
        muzzleFlash.active = false;
        enemySpawnTimer    = nextSpawnInterval();
        gameState          = STATE.PLAYING;
        initShip();
        // Start BGM on first ENTER press (satisfies autoplay policy)
        bgmStarted = true;
        bgmPlay();
      }

      // ── Game Over screen → Restart ────────────────────────────
      if (gameState === STATE.GAMEOVER && keys['Enter']) {
        keys['Enter'] = false;
        resetGame();
        // resetGame sets gameState = PLAYING; resume BGM
        bgmPlay();
      }

      // ── P — pause / resume ────────────────────────────────────
      if (keys['p'] || keys['P']) {
        keys['p'] = false;
        keys['P'] = false;
        if (gameState === STATE.PLAYING) {
          gameState = STATE.PAUSED;
          bgmPause();
        } else if (gameState === STATE.PAUSED) {
          gameState = STATE.PLAYING;
          bgmPlay();
        }
      }

      // ── SPACE — fire a bullet (respects cooldown) ─────────────
      if (gameState === STATE.PLAYING && keys[' '] && shootCooldown <= 0) {
        spawnBullet();
        // Rapid Fire halves the cooldown
        shootCooldown = (activePowerUp === PU.RAPID) ? SHOOT_DELAY * 0.4 : SHOOT_DELAY;
      }
    }

    /**
     * update — advance all game logic by dt seconds.
     * @param {number} dt  delta time in seconds
     */
    function update(dt) {
      updateStars(dt);
      if (gameState === STATE.PLAYING) {
        updateShip(dt);
        updateBullets(dt);
        updateEnemies(dt);
        updateBoss(dt);
        updateBossCountdown(dt);
        checkCollisions();
        checkBossCollisions();
        updatePowerUps(dt);
        updateParticles(dt);
        updateLevelEffects(dt);
        updateDeathFlash(dt);
      }
      if (gameState === STATE.GAMEOVER) {
        updateParticles(dt);
        updateDeathFlash(dt);
      }
    }

    /**
     * render — clear and redraw the full scene for this frame.
     * @param {number} dt  delta time passed to animated renderers
     */
    function render(dt) {
      // Apply camera shake before any drawing; restore afterwards
      var shaking = applyCameraShake();

      renderBackground();

      if (gameState === STATE.START) {
        renderStartScreen(dt);
      }
      if (gameState === STATE.PLAYING) {
        renderEnemies();
        renderBoss();           // boss hull + health bar + boss bullets
        renderPowerUps();       // falling capsules + floating pickup texts
        renderBullets();
        renderParticles();
        renderShieldAura();     // green ring around ship when shield is active
        renderShip();
        renderHUD();
        renderPowerUpHUD();     // active power-up name + countdown bar
        renderLevelUpBanner();
        renderBossCountdown();  // arrival countdown + warning banner
        renderDeathFlash();     // full-screen flash sits on top of everything
      }
      if (gameState === STATE.GAMEOVER) {
        renderEnemies();
        renderBoss();
        renderParticles();
        renderDeathFlash();
        renderGameOver(dt);
      }

      // Undo the shake translation (must be last)
      if (shaking) { ctx.restore(); }
    }

    /**
     * gameLoop — the main requestAnimationFrame callback.
     * Delta time is capped at 50 ms to prevent physics spikes on
     * hidden/throttled tabs.
     * @param {DOMHighResTimeStamp} timestamp
     */
    function gameLoop(timestamp) {
      var dt = Math.min((timestamp - lastTime) / 1000, 0.05);
      lastTime = timestamp;

      input();
      update(dt);
      render(dt);

      requestAnimationFrame(gameLoop);
    }

    /**
     * init — entry point.
     * Sizes the canvas, attaches event listeners, starts the loop.
     */
    function init() {
      // Match canvas to viewport
      resize();

      // Keyboard: track held keys
      window.addEventListener('keydown', function (e) {
        keys[e.key] = true;
        // Prevent arrow keys and Space from scrolling the page
        if (e.key === 'ArrowLeft'  ||
            e.key === 'ArrowRight' ||
            e.key === 'ArrowUp'    ||
            e.key === 'ArrowDown'  ||
            e.key === ' ') {
          e.preventDefault();
        }
        // Autoplay retry: if BGM was started but is still paused due to a
        // browser autoplay block, any subsequent key press will unblock it.
        if (bgmStarted && gameState === STATE.PLAYING) {
          bgmPlay();
        }
      });

      window.addEventListener('keyup', function (e) {
        keys[e.key] = false;
      });

      // Keep canvas full-screen on resize
      window.addEventListener('resize', resize);

      // Pause BGM when the tab is hidden; resume when it becomes visible again
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
          bgmPause();
        } else {
          // Only resume if the game is actively playing
          if (bgmStarted && gameState === STATE.PLAYING) {
            bgmPlay();
          }
        }
      });

      // Seed lastTime then start the loop on the next paint
      requestAnimationFrame(function (ts) {
        lastTime = ts;
        requestAnimationFrame(gameLoop);
      });
    }

    // ── Boot ──────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
